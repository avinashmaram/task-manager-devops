name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest httpx
      - name: Run tests
        run: pytest app/tests/ -v

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Docker image
        run: docker build -t task-manager .

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
          DB_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "$EC2_KEY" > key.pem
          chmod 600 key.pem
          docker save task-manager | ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@$EC2_HOST docker load
          ssh -i key.pem ec2-user@$EC2_HOST "
            docker stop task-manager || true
            docker rm task-manager || true
            docker run -d --name task-manager \
              -p 8000:8000 \
              -e DATABASE_URL=$DB_URL \
              task-manager
          "